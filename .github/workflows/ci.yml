name: CI

on:
  # We run CI on pushes to the main branch
  push:
    branches:
      - main
  # and on all pull requests to the main branch
  pull_request:
    branches:
      - main
  # as well as upon manual triggers through the 'Actions' tab of the Github UI
  workflow_dispatch:

jobs:
  build-and-test:
    name: Testing on ${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        # Note that macos is not included because Jimver/cuda-toolkit doesn't support it
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v2

    - name: Make build directory
      run: cmake -E make_directory ${{ github.workspace }}/build

    - uses: Jimver/cuda-toolkit@v0.2.35
      id: cuda-toolkit
      with:
        cuda: '13.2.0'

    - name: Set CUDA toolkit root
      run: echo "CUDAToolkit_ROOT=${{steps.cuda-toolkit.outputs.CUDA_PATH}}" >> $GITHUB_ENV

    - name: Configure cmake
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=Debug -Drml_BUILD_TESTING=ON -Drml_BUILD_DOCS=OFF -Drml_BUILD_PYTHON=OFF

    - name: Build
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: cmake --build .

    - name: Run tests
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: ctest

  python-testing:
    name: Python package testing on ${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        # Note that macos is not included because Jimver/cuda-toolkit doesn't support it
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v2

    - uses: Jimver/cuda-toolkit@v0.2.35
      id: cuda-toolkit
      with:
        cuda: '13.2.0'

    - name: Set CUDA toolkit root
      run: echo "CUDAToolkit_ROOT=${{steps.cuda-toolkit.outputs.CUDA_PATH}}" >> $GITHUB_ENV

    - name: Run Python tests
      shell: bash
      run: |
        python -m pip install .
        python -m pip install -r requirements-dev.txt
        pytest

